<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>제주에서 살아남기 — 자원순환 어드벤처</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #1565A0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Sans KR', sans-serif;
  }

  #game-root {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    background: #1C7AB8;
    color: #E8F4F0;
    position: relative;
    overflow: hidden;
  }

  @media (min-height: 600px) {
    #game-root { min-height: 600px; border-radius: 20px; }
  }

  .wave-bg {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 180px;
    background: linear-gradient(180deg, transparent 0%, #2389C9 40%, #156AA3 100%);
    z-index: 0;
  }

  .wave-svg {
    position: absolute;
    bottom: 90px; left: 0; right: 0;
    opacity: 0.15;
    pointer-events: none;
  }

  .screen {
    position: relative;
    z-index: 2;
    display: none;
  }
  .screen.active { display: flex; flex-direction: column; min-height: 600px; }

  /* ── INTRO ── */
  #intro {
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 44px 28px 48px;
    gap: 0;
  }

  .intro-island {
    font-size: 62px;
    margin-bottom: 10px;
    animation: float 3s ease-in-out infinite;
    display: block;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .game-title {
    font-size: 24px;
    font-weight: 700;
    color: #7EDDBB;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .game-subtitle {
    font-size: 13px;
    color: #8BBFCC;
    margin-bottom: 28px;
    line-height: 1.6;
  }

  .badge-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .badge {
    background: rgba(126,221,187,0.15);
    border: 1px solid rgba(126,221,187,0.3);
    color: #7EDDBB;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 20px;
    font-weight: 500;
  }

  .story-box {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(126,221,187,0.2);
    border-radius: 14px;
    padding: 18px 20px;
    font-size: 13.5px;
    line-height: 1.85;
    color: #C2DDE8;
    margin-bottom: 30px;
    text-align: left;
    width: 100%;
  }

  .story-box em {
    color: #7EDDBB;
    font-style: normal;
    font-weight: 600;
  }

  .btn-primary {
    background: #7EDDBB;
    color: #0A3D5C;
    border: none;
    padding: 15px 40px;
    border-radius: 30px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.15s, background 0.15s;
    letter-spacing: -0.2px;
  }
  .btn-primary:hover { background: #5ECAA5; transform: scale(1.03); }
  .btn-primary:active { transform: scale(0.97); }

  /* ── HUD ── */
  .hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid rgba(126,221,187,0.12);
  }

  .hud-progress {
    font-size: 12px;
    color: #8BBFCC;
    font-weight: 500;
  }

  .hud-score {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 15px;
    font-weight: 700;
    color: #7EDDBB;
  }

  .timer-ring-wrap {
    position: relative;
    width: 46px;
    height: 46px;
  }

  .timer-ring-wrap svg { transform: rotate(-90deg); }
  .timer-track { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 3.5; }
  .timer-bar {
    fill: none;
    stroke: #7EDDBB;
    stroke-width: 3.5;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.9s linear, stroke 0.3s;
  }

  .timer-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #E8F4F0;
  }

  .progress-dots {
    display: flex;
    gap: 5px;
    justify-content: center;
    padding: 12px 16px 4px;
    flex-wrap: wrap;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: background 0.3s;
  }
  .dot.done { background: #7EDDBB; }
  .dot.current { background: #FFD97D; }
  .dot.fail { background: #F4827A; }

  /* ── QUESTION ── */
  .q-scene {
    padding: 14px 22px 0;
    text-align: center;
  }

  .scene-emoji { font-size: 42px; margin-bottom: 5px; display: block; }
  .scene-emoji img { width: 56px; height: 56px; object-fit: contain; display: block; }

  .scene-label {
    font-size: 11px;
    color: #8BBFCC;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 8px;
  }

  .q-text {
    font-size: 15px;
    font-weight: 500;
    color: #E8F4F0;
    line-height: 1.7;
    padding: 0 4px;
    margin-bottom: 16px;
  }

  .options-grid {
    padding: 0 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .opt-btn {
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(126,221,187,0.22);
    border-radius: 12px;
    padding: 13px 15px;
    color: #D4EDE8;
    font-size: 13.5px;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    line-height: 1.55;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    width: 100%;
  }

  .opt-btn:hover:not(:disabled) {
    background: rgba(126,221,187,0.14);
    border-color: rgba(126,221,187,0.5);
    transform: translateX(3px);
  }

  .opt-btn.correct {
    background: rgba(94,202,165,0.22);
    border-color: #5ECAA5;
    color: #9EEBD2;
  }

  .opt-btn.wrong {
    background: rgba(244,130,122,0.15);
    border-color: #F4827A;
    color: #F4A09A;
  }

  .opt-btn.reveal {
    background: rgba(94,202,165,0.08);
    border-color: rgba(94,202,165,0.3);
    opacity: 0.7;
  }

  .opt-letter {
    background: rgba(126,221,187,0.2);
    color: #7EDDBB;
    border-radius: 6px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 700;
    min-width: 22px;
    text-align: center;
    margin-top: 2px;
    flex-shrink: 0;
  }

  /* ── FEEDBACK ── */
  .feedback-panel {
    margin: 0 16px 10px;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.7;
    display: none;
  }

  .feedback-panel.show { display: block; }

  .feedback-panel.good {
    background: rgba(94,202,165,0.14);
    border: 1px solid rgba(94,202,165,0.38);
    color: #9EEBD2;
  }

  .feedback-panel.bad {
    background: rgba(244,130,122,0.12);
    border: 1px solid rgba(244,130,122,0.32);
    color: #F4A09A;
  }

  .feedback-panel.timeout {
    background: rgba(255,217,125,0.1);
    border: 1px solid rgba(255,217,125,0.28);
    color: #FFD97D;
  }

  .feedback-head {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 6px;
  }

  .next-btn {
    display: none;
    width: calc(100% - 32px);
    margin: 0 16px 18px;
    background: rgba(126,221,187,0.18);
    border: 1.5px solid rgba(126,221,187,0.38);
    border-radius: 10px;
    color: #7EDDBB;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    padding: 13px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .next-btn.show { display: block; }
  .next-btn:hover { background: rgba(126,221,187,0.28); }

  /* ── RESULT ── */
  #result {
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 36px 24px 48px;
  }

  .result-icon { font-size: 68px; margin-bottom: 14px; display: block; }

  .result-tier {
    font-size: 11px;
    letter-spacing: 1.8px;
    color: #8BBFCC;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .result-title {
    font-size: 24px;
    font-weight: 700;
    color: #7EDDBB;
    margin-bottom: 20px;
    line-height: 1.3;
  }

  .score-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 16px;
  }

  .score-num {
    font-size: 56px;
    font-weight: 700;
    color: #FFD97D;
    line-height: 1;
  }

  .score-label { font-size: 12px; color: #8BBFCC; margin-top: 5px; }

  .star-row {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 22px;
    font-size: 26px;
  }

  .result-msg {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(126,221,187,0.2);
    border-radius: 14px;
    padding: 18px 20px;
    font-size: 13.5px;
    line-height: 1.8;
    color: #C2DDE8;
    margin-bottom: 20px;
    text-align: left;
    width: 100%;
  }

  .result-msg strong { color: #7EDDBB; font-weight: 600; }

  .log-list {
    width: 100%;
    margin-bottom: 26px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .log-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 9px;
    padding: 9px 14px;
    font-size: 12.5px;
    color: #9BB8C4;
  }

  .log-item .log-icon { font-size: 16px; flex-shrink: 0; }
  .log-item.got { color: #9EEBD2; }
  .log-item.lost { color: #F4A09A; }

  .btn-restart {
    background: transparent;
    border: 1.5px solid rgba(126,221,187,0.38);
    border-radius: 30px;
    color: #7EDDBB;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    padding: 13px 34px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-restart:hover { background: rgba(126,221,187,0.12); }

  .insta-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    background: linear-gradient(135deg, #FEDA77 0%, #DD2A7B 50%, #515BD4 100%);
    border: none;
    border-radius: 14px;
    color: #FFFFFF;
    font-size: 13.5px;
    font-weight: 600;
    font-family: inherit;
    padding: 14px 16px;
    text-decoration: none;
    margin-bottom: 14px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 14px rgba(221,42,123,0.25);
  }
  .insta-link:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(221,42,123,0.35); }
  .insta-link:active { transform: translateY(0); }
  .insta-link svg { flex-shrink: 0; }
</style>
</head>
<body>

<div id="game-root">
  <div class="wave-bg"></div>
  <svg class="wave-svg" viewBox="0 0 420 80" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,40 C70,10 140,70 210,40 C280,10 350,70 420,40 L420,80 L0,80 Z" fill="#7EDDBB"/>
  </svg>

  <!-- INTRO -->
  <div id="intro" class="screen active">
    <span class="intro-island">🏝️</span>
    <div class="game-title">제주에서 살아남기</div>
    <div class="game-subtitle">자원순환 실천 어드벤처</div>
    <div class="badge-row">
      <span class="badge">⏱ 8초 제한</span>
      <span class="badge">🌊 10가지 상황</span>
      <span class="badge">♻️ 자원순환 점수</span>
    </div>
    <div class="story-box">
      힐링을 위해 제주에서 한달살기를 시작한 당신!<br>
      매일 크고 작은 선택의 순간이 찾아오고,<br>
      <em>올바른 자원순환 선택</em>만이 당신을<br>
      진정한 <em>제주 새활용 마스터</em>로 만들어 줍니다.<br><br>
      각 상황마다 <em>8초</em> 안에 결정하세요!
    </div>
    <button class="btn-primary" onclick="startGame()">도전 시작 🌿</button>
  </div>

  <!-- GAME -->
  <div id="game" class="screen">
    <div class="hud">
      <div>
        <div class="hud-progress" id="q-progress">상황 1 / 5</div>
      </div>
      <div class="hud-score">
        <span>♻️</span>
        <span id="score-hud">0</span>점
      </div>
      <div class="timer-ring-wrap">
        <svg width="46" height="46" viewBox="0 0 46 46">
          <circle class="timer-track" cx="23" cy="23" r="18"/>
          <circle class="timer-bar" id="timer-bar" cx="23" cy="23" r="18"
            stroke-dasharray="113.1" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-num" id="timer-num">8</div>
      </div>
    </div>

    <div class="progress-dots" id="progress-dots">
      <div class="dot current" id="dot-0"></div>
      <div class="dot" id="dot-1"></div>
      <div class="dot" id="dot-2"></div>
      <div class="dot" id="dot-3"></div>
      <div class="dot" id="dot-4"></div>
      <div class="dot" id="dot-5"></div>
      <div class="dot" id="dot-6"></div>
      <div class="dot" id="dot-7"></div>
      <div class="dot" id="dot-8"></div>
      <div class="dot" id="dot-9"></div>
    </div>

    <div class="q-scene">
      <span class="scene-emoji" id="scene-emoji" style="display:inline-flex;align-items:center;justify-content:center;">🌊</span>
      <div class="scene-label" id="scene-label">상황</div>
      <div class="q-text" id="q-text"></div>
    </div>

    <div class="options-grid" id="options-grid"></div>

    <div class="feedback-panel" id="feedback-panel">
      <div class="feedback-head" id="feedback-head"></div>
      <div id="feedback-body"></div>
    </div>

    <button class="next-btn" id="next-btn" onclick="nextQuestion()">다음 상황으로 →</button>
  </div>

  <!-- RESULT -->
  <div id="result" class="screen">
    <span class="result-icon" id="result-icon">🌟</span>
    <div class="result-tier" id="result-tier">달성 등급</div>
    <div class="result-title" id="result-title">제주 새활용 마스터</div>
    <div class="score-display">
      <div class="score-num" id="result-score">0</div>
      <div class="score-label">자원순환 점수</div>
    </div>
    <div class="star-row" id="star-row"></div>
    <div class="result-msg" id="result-msg"></div>
    <div class="log-list" id="log-list"></div>
    <a class="insta-link" href="https://www.instagram.com/juc_jejucity/" target="_blank" rel="noopener noreferrer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="20" height="20" rx="5" stroke="white" stroke-width="2"/>
        <circle cx="12" cy="12" r="4.2" stroke="white" stroke-width="2"/>
        <circle cx="17.5" cy="6.5" r="1.2" fill="white"/>
      </svg>
      제주시새활용센터 인스타그램 바로가기
    </a>
    <button class="btn-restart" onclick="restartGame()">다시 도전하기 🔄</button>
  </div>
</div>

let state = {};

function startGame() {
  state = {
    current: 0,
    score: 0,
    log: [],
    answered: false,
    timer: null,
    dotStates: new Array(QUESTIONS.length).fill('')
  };
  showScreen('game');
  loadQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function loadQuestion() {
  const q = QUESTIONS[state.current];
  state.answered = false;

  document.getElementById('q-progress').textContent = `상황 ${state.current + 1} / ${QUESTIONS.length}`;
  document.getElementById('score-hud').textContent = state.score;
  const sceneEmojiEl = document.getElementById('scene-emoji');
  if (q.emoji.startsWith('IMG:')) {
    sceneEmojiEl.innerHTML = `<img src="${q.emoji.slice(4)}" alt="${q.label}">`;
  } else {
    sceneEmojiEl.textContent = q.emoji;
  }
  document.getElementById('scene-label').textContent = q.label;
  document.getElementById('q-text').textContent = q.text;

  const letters = ['A','B','C','D'];
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt.text}</span>`;
    btn.onclick = () => selectOption(i);
    grid.appendChild(btn);
  });

  document.getElementById('feedback-panel').className = 'feedback-panel';
  document.getElementById('next-btn').className = 'next-btn';

  updateDots();
  startTimer();
}

function updateDots() {
  for (let i = 0; i < QUESTIONS.length; i++) {
    const d = document.getElementById('dot-' + i);
    d.className = 'dot';
    if (i < state.current) {
      d.classList.add(state.dotStates[i] === 'fail' ? 'fail' : 'done');
    } else if (i === state.current) {
      d.classList.add('current');
    }
  }
}

function startTimer() {
  const bar = document.getElementById('timer-bar');
  const num = document.getElementById('timer-num');
  const circumference = 113.1;

  bar.style.strokeDashoffset = '0';
  bar.style.stroke = '#7EDDBB';
  num.textContent = '8';

  clearInterval(state.timer);
  const startTime = Date.now();
  const duration = 8000;

  state.timer = setInterval(() => {
    const elapsed = Date.now() - startTime;
    const remaining = Math.max(0, duration - elapsed);
    const secs = Math.ceil(remaining / 1000);
    const frac = remaining / duration;

    num.textContent = secs;
    bar.style.strokeDashoffset = String(circumference * (1 - frac));
    if (frac < 0.4) bar.style.stroke = '#FFD97D';
    if (frac < 0.2) bar.style.stroke = '#F4827A';

    if (remaining <= 0) {
      clearInterval(state.timer);
      if (!state.answered) handleTimeout();
    }
  }, 50);
}

function selectOption(idx) {
  if (state.answered) return;
  clearInterval(state.timer);
  state.answered = true;

  const q = QUESTIONS[state.current];
  const btns = document.querySelectorAll('.opt-btn');
  const isCorrect = q.correct.includes(idx);
  const isNeutral = !isCorrect && q.neutral && q.neutral.includes(idx);

  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (q.correct.includes(i)) btn.classList.add('correct');
    else if (i === idx) btn.classList.add('wrong');
    else btn.classList.add('reveal');
  });

  const fp = document.getElementById('feedback-panel');
  const fh = document.getElementById('feedback-head');
  const fb = document.getElementById('feedback-body');

  if (isCorrect) {
    state.score += q.points;
    state.dotStates[state.current] = 'done';
    fp.className = 'feedback-panel good show';
    fh.textContent = `✅ 정답! +${q.points}점`;
    const goodText = (q.feedback_good_map && q.feedback_good_map[idx]) || q.feedback_good;
    fb.textContent = goodText;
    state.log.push({ text: q.label, got: true, pts: q.points });
  } else if (isNeutral) {
    state.dotStates[state.current] = 'fail';
    fp.className = 'feedback-panel timeout show';
    fh.textContent = `🤔 아깝네요! +0점`;
    fb.textContent = q.feedback_neutral;
    state.log.push({ text: q.label, got: false, pts: 0 });
  } else {
    state.dotStates[state.current] = 'fail';
    fp.className = 'feedback-panel bad show';
    fh.textContent = `❌ 아쉬워요! +0점`;
    const badText = (q.feedback_bad_map && q.feedback_bad_map[idx]) || q.feedback_bad;
    fb.textContent = badText;
    state.log.push({ text: q.label, got: false, pts: 0 });
  }

  document.getElementById('score-hud').textContent = state.score;
  updateDots();
  showNextBtn();
}

function handleTimeout() {
  if (state.answered) return;
  state.answered = true;

  const q = QUESTIONS[state.current];
  document.querySelectorAll('.opt-btn').forEach((btn, i) => {
    btn.disabled = true;
    if (q.correct.includes(i)) btn.classList.add('correct');
    else btn.classList.add('reveal');
  });

  state.dotStates[state.current] = 'fail';
  document.getElementById('feedback-panel').className = 'feedback-panel timeout show';
  document.getElementById('feedback-head').textContent = '⏱ 시간 초과!';
  document.getElementById('feedback-body').textContent = q.feedback_timeout;
  state.log.push({ text: q.label, got: false, pts: 0 });

  updateDots();
  showNextBtn();
}

function showNextBtn() {
  const nb = document.getElementById('next-btn');
  nb.className = 'next-btn show';
  nb.textContent = state.current < QUESTIONS.length - 1 ? '다음 상황으로 →' : '결과 보기 🏁';
}

function nextQuestion() {
  if (state.current < QUESTIONS.length - 1) {
    state.current++;
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  clearInterval(state.timer);
  showScreen('result');

  const s = state.score;
  const ending = ENDINGS.find(e => s >= e.min && s <= e.max) || ENDINGS[2];

  document.getElementById('result-icon').textContent = ending.icon;
  document.getElementById('result-tier').textContent = ending.tier;
  document.getElementById('result-title').textContent = ending.title;
  document.getElementById('result-score').textContent = s;
  document.getElementById('star-row').textContent = ending.stars;
  document.getElementById('result-msg').innerHTML = ending.msg;

  const logEl = document.getElementById('log-list');
  logEl.innerHTML = '';
  state.log.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = `log-item ${item.got ? 'got' : 'lost'}`;
    div.innerHTML = `<span class="log-icon">${item.got ? '✅' : '❌'}</span>
      <span style="flex:1">상황 ${i+1}: ${item.text}</span>
      <span style="font-weight:600">${item.got ? '+'+item.pts : '0'}점</span>`;
    logEl.appendChild(div);
  });
}

function restartGame() {
  showScreen('intro');
}
</script>
